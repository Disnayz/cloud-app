version: '3.9'

services:
  frontend:
    image: nginx:alpine
    container_name: cloudtask-frontend
    ports:
      - "3000:80"
    restart: always

  backend:
    image: mcr.microsoft.com/dotnet/samples:aspnetapp
    container_name: cloudtask-backend
    ports:
      - "8080:8080"
    restart: always

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cloudtask-db
    environment:
      SA_PASSWORD: "Budowa_administracja_aplikacji"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    restart: always